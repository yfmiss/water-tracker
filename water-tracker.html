<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喝水打卡 💧</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* 进度环 */
        .progress-section {
            text-align: center;
        }

        .progress-ring {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 15;
        }

        .progress-ring .bg {
            stroke: #e0e0e0;
        }

        .progress-ring .progress {
            stroke: #4facfe;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .progress-text .amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #333;
        }

        .progress-text .goal {
            font-size: 0.9rem;
            color: #999;
        }

        /* 积分显示 */
        .points-display {
            text-align: center;
            margin-top: 10px;
            font-size: 1.1rem;
            color: #ffd700;
            font-weight: bold;
        }

        /* 成员选择 */
        .member-select {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }

        .member-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #666;
        }

        .member-btn:hover {
            transform: scale(1.1);
            border-color: #4facfe;
        }

        .member-btn.active {
            border-color: #4facfe;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
        }

        .member-btn .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* 快捷按钮 */
        .quick-add {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            transform: translateY(-2px);
        }

        .quick-btn.btn-200 {
            background: #e3f2fd;
            color: #1976d2;
        }

        .quick-btn.btn-300 {
            background: #e8f5e9;
            color: #388e3c;
        }

        .quick-btn.btn-500 {
            background: #fff3e0;
            color: #f57c00;
        }

        .quick-btn.btn-custom {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        /* 自定义输入 */
        .custom-input {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .custom-input.show {
            display: flex;
        }

        .custom-input input {
            width: 120px;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            text-align: center;
        }

        .custom-input input:focus {
            outline: none;
            border-color: #7b1fa2;
        }

        .custom-input button {
            padding: 10px 20px;
            background: #7b1fa2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        /* 今日排名 */
        .ranking-section h2,
        .trend-section h2 {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .ranking-item.highlight {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .ranking-item .rank {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .ranking-item .rank.gold { background: #ffd700; color: white; }
        .ranking-item .rank.silver { background: #c0c0c0; color: white; }
        .ranking-item .rank.bronze { background: #cd7f32; color: white; }

        .ranking-item .avatar-small {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .ranking-item .name {
            flex: 1;
            font-weight: 500;
        }

        .ranking-item .amount {
            font-weight: bold;
            font-size: 1.1rem;
            margin-right: 10px;
        }

        .ranking-item .points {
            font-size: 0.8rem;
            color: #ffd700;
            font-weight: bold;
        }

        .ranking-item.highlight .points {
            color: white;
        }

        .encouragement {
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #333;
        }

        /* 成就系统 */
        .achievements-section {
            margin-top: 15px;
        }

        .achievements-section h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 10px;
        }

        .achievements-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .achievement-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .achievement-badge.locked {
            background: #e0e0e0;
            color: #999;
        }

        /* 7天趋势图 - 按成员分组 */
        .chart-container {
            padding: 20px 10px;
            background: #f8f9fa;
            border-radius: 12px;
            overflow-x: auto;
        }

        .chart-days {
            display: flex;
            gap: 15px;
            min-width: 600px;
        }

        .chart-day {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
        }

        .chart-day-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .chart-members {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 100%;
        }

        .chart-member {
            display: flex;
            align-items: center;
            gap: 5px;
            width: 100%;
            justify-content: center;
        }

        .chart-member-avatar {
            font-size: 0.8rem;
        }

        .chart-member-bar {
            width: 45px;
            height: 14px;
            border-radius: 4px;
            transition: width 0.5s ease;
            position: relative;
        }

        .chart-member-bar:hover {
            opacity: 0.8;
        }

        .chart-member-amount {
            font-size: 0.65rem;
            color: #999;
            min-width: 35px;
        }

        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: #666;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* 日期标签 */
        .date-header {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4caf50;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        /* 选中提示 */
        .select-hint {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* 积分规则 */
        .points-rules {
            margin-top: 15px;
        }

        .points-rules h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 10px;
        }

        .points-rules-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .points-rule-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .points-rule-item .icon {
            font-size: 1.2rem;
        }

        .points-rule-item .rule-text {
            flex: 1;
            color: #333;
        }

        .points-rule-item .points-value {
            background: #ffd700;
            color: #333;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .member-btn { width: 60px; height: 60px; }
            .quick-btn { padding: 10px 18px; font-size: 0.9rem; }
            .chart-member-bar { width: 35px; height: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💧 喝水打卡</h1>
        <p class="date-header" id="dateHeader"></p>

        <div class="card progress-section">
            <div class="progress-ring">
                <svg width="200" height="200">
                    <circle class="bg" cx="100" cy="100" r="85"></circle>
                    <circle class="progress" id="progressCircle" cx="100" cy="100" r="85"
                            stroke-dasharray="534" stroke-dashoffset="534"></circle>
                </svg>
                <div class="progress-text">
                    <div class="amount" id="totalAmount">0ml</div>
                    <div class="goal">目标 2000ml</div>
                    <div class="points-display" id="pointsDisplay">🏅 积分: 0</div>
                </div>
            </div>
        </div>

        <div class="card">
            <p class="select-hint">👇 选择你的名字开始打卡</p>
            <div class="member-select" id="memberSelect"></div>

            <div class="quick-add">
                <button class="quick-btn btn-200" onclick="addWater(200)">+200ml</button>
                <button class="quick-btn btn-300" onclick="addWater(300)">+300ml</button>
                <button class="quick-btn btn-500" onclick="addWater(500)">+500ml</button>
                <button class="quick-btn btn-custom" onclick="toggleCustom()">自定义</button>
            </div>

            <div class="custom-input" id="customInput">
                <input type="number" id="customAmount" placeholder="输入ml数" min="1">
                <button onclick="addCustomWater()">添加</button>
                <button onclick="toggleCustom()" style="background: #999;">取消</button>
            </div>
        </div>

        <div class="card ranking-section">
            <h2>🏆 今日排名</h2>
            <div class="ranking-list" id="rankingList"></div>
            <div class="encouragement" id="encouragement" style="display: none;"></div>
        </div>

        <div class="card trend-section">
            <h2>📈 最近7天趋势</h2>
            <div class="chart-container" id="chartContainer"></div>
        </div>

        <div class="card points-rules">
            <h2>🎁 积分规则</h2>
            <div class="points-rules-list">
                <div class="points-rule-item">
                    <span class="icon">💧</span>
                    <span class="rule-text">每次打卡</span>
                    <span class="points-value">+1 积分</span>
                </div>
                <div class="points-rule-item">
                    <span class="icon">🎯</span>
                    <span class="rule-text">单日达标 (≥2000ml)</span>
                    <span class="points-value">+5 积分</span>
                </div>
                <div class="points-rule-item">
                    <span class="icon">🏆</span>
                    <span class="rule-text">每日MVP (喝水最多)</span>
                    <span class="points-value">+10 积分</span>
                </div>
                <div class="points-rule-item">
                    <span class="icon">🏅</span>
                    <span class="rule-text">解锁成就徽章</span>
                    <span class="points-value">永久记录</span>
                </div>
            </div>
        </div>

        <div class="card achievements-section">
            <h2>🏅 成就系统</h2>
            <div class="achievements-list" id="achievementsList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyD0fAMKwhUkPny5kMONvHlnLsyqcjF27qk",
            authDomain: "water-tracker-ab90f.firebaseapp.com",
            databaseURL: "https://water-tracker-ab90f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "water-tracker-ab90f",
            storageBucket: "water-tracker-ab90f.firebasestorage.app",
            messagingSenderId: "663616463546",
            appId: "1:663616463546:web:e13cc1c962341320f8d883"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 成员配置
        const members = [
            { id: 'vickieyanwenjie', name: 'Vickie', avatar: '👩‍💼' },
            { id: 'anxihua_v', name: 'Anxihua', avatar: '👨‍💻' },
            { id: 'fanyang', name: 'Fanyang', avatar: '👩‍🎨' },
            { id: 'lrzliruizhi_v', name: 'Lrzliruizhi', avatar: '👨‍🔬' },
            { id: 'xuqiangwei', name: 'Xuqiangwei', avatar: '👨‍🎓' }
        ];

        // 鼓励话术库
        const encouragements = [
            '💧 喝水是提高效率的秘诀！继续加油！',
            '🌟 身体是革命的本钱，多喝水才能继续搬砖！',
            '🚀 还差一点就达标了，加把劲！',
            '💪 偷偷告诉你：多喝水皮肤会变好哦～',
            '🎯 今天的目标还没完成，快去倒杯水吧！',
            '🌈 喝水打卡，健康从我做起！',
            '⚡ 喝水能提高专注力，快来一杯！'
        ];

        // 成就定义
        const achievements = [
            { id: 'first_day', name: '🎉 初次打卡', desc: '完成第一次打卡', check: (data, memberId) => data[memberId] > 0 },
            { id: 'reach_goal', name: '🎯 达标达人', desc: '单日喝水达到2000ml', check: (data, memberId) => data[memberId] >= 2000 },
            { id: 'over_3k', name: '🔥 超量完成', desc: '单日喝水超过3000ml', check: (data, memberId) => data[memberId] >= 3000 },
            { id: 'streak_3', name: '📆 三连打卡', desc: '连续打卡3天', check: (allData, memberId) => checkStreak(allData, memberId) >= 3 },
            { id: 'streak_7', name: '🌟 一周坚持', desc: '连续打卡7天', check: (allData, memberId) => checkStreak(allData, memberId) >= 7 },
            { id: 'total_10k', name: '💧 10升俱乐部', desc: '累计喝水超过10升', check: (allData, memberId) => getTotalAmount(allData, memberId) >= 10000 },
            { id: 'total_50k', name: '🏆 50升大师', desc: '累计喝水超过50升', check: (allData, memberId) => getTotalAmount(allData, memberId) >= 50000 },
            { id: 'mvp_once', name: '👑 单日冠军', desc: '获得过至少一次MVP', check: (allData, memberId) => checkMVPCount(allData, memberId) >= 1 }
        ];

        let currentMember = null;
        let allData = {};
        let allPoints = {};

        // 获取今日日期字符串
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        // 获取今日数据
        function getTodayData() {
            const today = getToday();
            return allData[today] || {};
        }

        // 检查连续打卡天数
        function checkStreak(allData, memberId) {
            let streak = 0;
            const today = new Date();

            for (let i = 0; i < 365; i++) {
                const date = new Date();
                date.setDate(today.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const dayData = allData[dateStr] || {};

                if (dayData[memberId] && dayData[memberId] > 0) {
                    streak++;
                } else {
                    break;
                }
            }

            return streak;
        }

        // 获取累计喝水量
        function getTotalAmount(allData, memberId) {
            let total = 0;
            for (let date in allData) {
                const dayData = allData[date] || {};
                total += dayData[memberId] || 0;
            }
            return total;
        }

        // 检查MVP次数
        function checkMVPCount(allData, memberId) {
            let count = 0;
            for (let date in allData) {
                const dayData = allData[date] || {};
                let max = 0;
                let mvp = null;

                for (let id in dayData) {
                    if (dayData[id] > max) {
                        max = dayData[id];
                        mvp = id;
                    }
                }

                if (mvp === memberId) count++;
            }
            return count;
        }

        // 添加喝水量
        function addWater(ml) {
            if (!currentMember) {
                showToast('请先选择你的名字！');
                return;
            }

            const today = getToday();
            const todayData = getTodayData();
            const newAmount = (todayData[currentMember] || 0) + ml;

            // 使用事务添加水量
            const ref = database.ref('waterData/' + today + '/' + currentMember);

            ref.transaction(function(currentValue) {
                return (currentValue || 0) + ml;
            }, function(error, committed, snapshot) {
                if (error) {
                    showToast('添加失败，请重试！');
                } else if (committed) {
                    // 计算积分
                    let pointsEarned = 1; // 每次打卡+1分
                    let messages = [`+${ml}ml 记录成功！`];

                    // 检查是否达标
                    if (newAmount >= 2000 && (todayData[currentMember] || 0) < 2000) {
                        pointsEarned += 5; // 达标额外+5分
                        messages.push('🎉 恭喜达标！+5积分');
                    }

                    // 更新积分
                    const pointsRef = database.ref('points/' + currentMember);
                    pointsRef.transaction(function(currentPoints) {
                        return (currentPoints || 0) + pointsEarned;
                    });

                    messages.forEach((msg, i) => {
                        setTimeout(() => showToast(msg), i * 1500);
                    });

                    // 检查并分配MVP（每日喝水最多的）
                    setTimeout(() => assignMVP(today), 1000);
                }
            });
        }

        // 分配每日MVP
        function assignMVP(date) {
            const dayData = allData[date] || {};
            let max = 0;
            let mvpId = null;

            for (let id in dayData) {
                if (dayData[id] > max) {
                    max = dayData[id];
                    mvpId = id;
                }
            }

            if (mvpId && max > 0) {
                // 检查今天是否已经给过MVP积分
                const mvpRef = database.ref('dailyMVP/' + date);

                mvpRef.once('value', function(snapshot) {
                    const existingMVP = snapshot.val();

                    if (existingMVP !== mvpId) {
                        // 如果MVP换了人，移除之前的MVP积分
                        if (existingMVP) {
                            database.ref('points/' + existingMVP).transaction(function(currentPoints) {
                                return Math.max((currentPoints || 0) - 10, 0);
                            });
                        }

                        // 给新MVP加积分
                        database.ref('points/' + mvpId).transaction(function(currentPoints) {
                            return (currentPoints || 0) + 10;
                        });

                        // 记录今天的MVP
                        mvpRef.set(mvpId);

                        const mvpMember = members.find(m => m.id === mvpId);
                        if (mvpMember) {
                            showToast(`🏆 ${mvpMember.name} 今日MVP！+10积分`);
                        }
                    }
                });
            }
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 切换自定义输入
        function toggleCustom() {
            const input = document.getElementById('customInput');
            input.classList.toggle('show');
            if (input.classList.contains('show')) {
                document.getElementById('customAmount').focus();
            }
        }

        // 添加自定义水量
        function addCustomWater() {
            const input = document.getElementById('customAmount');
            const ml = parseInt(input.value);
            if (ml > 0) {
                addWater(ml);
                input.value = '';
                toggleCustom();
            }
        }

        // 更新UI
        function updateUI() {
            updateDate();
            updateProgress();
            renderMembers();
            updateRanking();
            updateChart();
            updateAchievements();
        }

        // 更新日期
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('dateHeader').textContent = now.toLocaleDateString('zh-CN', options);
        }

        // 更新进度环
        function updateProgress() {
            const todayData = getTodayData();
            let total = 0;
            for (let id in todayData) {
                total += todayData[id];
            }

            document.getElementById('totalAmount').textContent = total + 'ml';

            const goal = 2000;
            const percentage = Math.min(total / goal, 1);
            const circumference = 2 * Math.PI * 85;
            const offset = circumference * (1 - percentage);

            document.getElementById('progressCircle').style.strokeDashoffset = offset;

            // 更新当前成员积分
            if (currentMember) {
                const points = allPoints[currentMember] || 0;
                document.getElementById('pointsDisplay').textContent = `🏅 积分: ${points}`;
            } else {
                document.getElementById('pointsDisplay').textContent = '🏅 请选择你的名字';
            }
        }

        // 渲染成员选择
        function renderMembers() {
            const container = document.getElementById('memberSelect');
            container.innerHTML = members.map(m => `
                <button class="member-btn ${currentMember === m.id ? 'active' : ''}"
                        onclick="selectMember('${m.id}')">
                    <div class="avatar">${m.avatar}</div>
                    <span>${m.name}</span>
                </button>
            `).join('');
        }

        // 选择成员
        function selectMember(id) {
            currentMember = currentMember === id ? null : id;
            renderMembers();
            updateProgress();
        }

        // 更新排名
        function updateRanking() {
            const todayData = getTodayData();
            const rankings = members.map(m => ({
                ...m,
                amount: todayData[m.id] || 0,
                points: allPoints[m.id] || 0
            })).sort((a, b) => b.amount - a.amount);

            const list = document.getElementById('rankingList');
            list.innerHTML = rankings.map((m, i) => {
                let rankClass = '';
                if (i === 0 && m.amount > 0) rankClass = 'gold';
                else if (i === 1) rankClass = 'silver';
                else if (i === 2) rankClass = 'bronze';

                const isMVP = i === 0 && m.amount > 0;

                return `
                    <div class="ranking-item ${currentMember === m.id ? 'highlight' : ''}">
                        <div class="rank ${rankClass}">${i + 1}</div>
                        <div class="avatar-small">
                            ${m.avatar}
                        </div>
                        <span class="name">${m.name} ${isMVP ? '<span class="mvp-badge">🏆 MVP</span>' : ''}</span>
                        <span class="amount">${m.amount}ml</span>
                        <span class="points">🏅 ${m.points}</span>
                    </div>
                `;
            }).join('');

            // 显示鼓励话术（给喝最少的人）
            updateEncouragement(rankings);
        }

        // 更新鼓励话术
        function updateEncouragement(rankings) {
            const encouragementEl = document.getElementById('encouragement');

            // 找出喝得最少且有记录的人
            const withData = rankings.filter(m => m.amount > 0);

            if (withData.length > 0) {
                const least = withData[withData.length - 1];

                if (least.amount < 2000) {
                    const msg = encouragements[Math.floor(Math.random() * encouragements.length)];
                    encouragementEl.innerHTML = `${least.avatar} <strong>${least.name}</strong>，加油！${msg}`;
                    encouragementEl.style.display = 'block';
                } else {
                    encouragementEl.style.display = 'none';
                }
            } else {
                encouragementEl.style.display = 'none';
            }
        }

        // 成员颜色配置
        const memberColors = {
            'vickieyanwenjie': '#FF6B6B',
            'anxihua_v': '#4ECDC4',
            'fanyang': '#45B7D1',
            'lrzliruizhi_v': '#96CEB4',
            'xuqiangwei': '#FFEAA7'
        };

        // 更新趋势图 - 按成员分组
        function updateChart() {
            const container = document.getElementById('chartContainer');
            const maxAmount = 2000;
            const days = [];

            // 收集最近7天的数据
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const dayData = allData[dateStr] || {};

                days.push({
                    label: i === 0 ? '今天' : (date.getMonth() + 1) + '/' + date.getDate(),
                    memberData: members.map(m => ({
                        ...m,
                        amount: dayData[m.id] || 0
                    }))
                });
            }

            // 渲染图表
            let chartHTML = '<div class="chart-days">';

            days.forEach(day => {
                chartHTML += `
                    <div class="chart-day">
                        <div class="chart-day-label">${day.label}</div>
                        <div class="chart-members">
                            ${day.memberData.map(m => {
                                const width = m.amount > 0 ? Math.max((m.amount / maxAmount) * 100, 20) : 0;
                                return `
                                    <div class="chart-member">
                                        <span class="chart-member-avatar">${m.avatar}</span>
                                        <div class="chart-member-bar"
                                             style="width: ${width}px; background: ${memberColors[m.id]}; ${m.amount === 0 ? 'opacity: 0.3;' : ''}"
                                             title="${m.name}: ${m.amount}ml"></div>
                                        <span class="chart-member-amount">${m.amount > 0 ? m.amount + 'ml' : '-'}</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });

            chartHTML += '</div>';

            // 图例
            chartHTML += '<div class="chart-legend">';
            members.forEach(m => {
                chartHTML += `
                    <div class="legend-item">
                        <div class="legend-color" style="background: ${memberColors[m.id]}"></div>
                        <span>${m.avatar} ${m.name}</span>
                    </div>
                `;
            });
            chartHTML += '</div>';

            container.innerHTML = chartHTML;
        }

        // 更新成就系统
        function updateAchievements() {
            if (!currentMember) return;

            const todayData = getTodayData();
            const achievementsList = document.getElementById('achievementsList');

            achievementsList.innerHTML = achievements.map(a => {
                const unlocked = a.check(allData, currentMember);
                return `
                    <div class="achievement-badge ${unlocked ? '' : 'locked'}">
                        ${a.name}
                    </div>
                `;
            }).join('');
        }

        // 监听 Firebase 数据变化
        database.ref('waterData').on('value', function(snapshot) {
            allData = snapshot.val() || {};
            updateUI();
        });

        database.ref('points').on('value', function(snapshot) {
            allPoints = snapshot.val() || {};
            updateProgress();
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            renderMembers();

            // 回车键添加自定义
            document.getElementById('customAmount').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addCustomWater();
            });
        });
    </script>
</body>
</html>
